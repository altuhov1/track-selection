openapi: 3.0.0
info:
  title: Track Selection Service API
  description: API для сервиса выбора трека обучения
  version: 1.0.0
  contact:
    name: Support
    email: support@track-selection.com

servers:
  - url: http://localhost:8080/api
    description: Local development server
  - url: https://api.track-selection.com/api
    description: Production server

tags:
  - name: Auth
    description: Аутентификация и регистрация
  - name: User
    description: Информация о пользователе
  - name: Preferences
    description: Предпочтения пользователя
  - name: Tracks
    description: Управление образовательными треками
  - name: Recommendations
    description: Рекомендации треков
  - name: Selection
    description: Выбор треков студентом

paths:
  # ==================== AUTH ====================
  /register:
    post:
      tags:
        - Auth
      summary: Регистрация нового пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - role
                - first_name
                - last_name
              properties:
                email:
                  type: string
                  format: email
                  example: "ivan@example.com"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                role:
                  type: string
                  enum:
                    - student
                    - admin
                  example: "student"
                first_name:
                  type: string
                  example: "Иван"
                last_name:
                  type: string
                  example: "Петров"
      responses:
        '201':
          description: Пользователь успешно создан
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "user created"
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Пользователь уже существует
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /login:
    post:
      tags:
        - Auth
      summary: Вход в систему
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "ivan@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '401':
          description: Неверные учетные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== USER ====================
  /me:
    get:
      tags:
        - User
      summary: Получить информацию о текущем пользователе
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  email:
                    type: string
                    format: email
                  first_name:
                    type: string
                  last_name:
                    type: string
                  role:
                    type: string
                    enum: [student, admin]
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/profile-completion:
    get:
      tags:
        - User
      summary: Получить статус заполнения профиля
      operationId: getProfileCompletion
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  is_complete:
                    type: boolean
                  completed_at:
                    type: string
                    format: date-time
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== PREFERENCES ====================
  /me/info:
    get:
      tags:
        - Preferences
      summary: Получить предпочтения пользователя
      operationId: getUserPreferences
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Preferences'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /me/edit-info:
    post:
      tags:
        - Preferences
      summary: Обновить предпочтения пользователя
      operationId: updateUserPreferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                professional_goals:
                  type: array
                  items:
                    type: integer
                grades:
                  $ref: '#/components/schemas/Grades'
                skills:
                  $ref: '#/components/schemas/Skills'
                learning_style:
                  type: integer
                  enum: [1, 2, 3]
                certificates:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: Предпочтения успешно обновлены
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== TRACKS ====================
  /all-tracks:
    get:
      tags:
        - Tracks
      summary: Получить все треки (публичный)
      operationId: getAllTracks
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Track'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /new-track:
    post:
      tags:
        - Tracks
      summary: Создать новый трек (только admin)
      operationId: createTrack
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrackInput'
      responses:
        '201':
          description: Трек успешно создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Track'
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ запрещен (требуется роль admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /edit-track/{id}:
    put:
      tags:
        - Tracks
      summary: Обновить трек (только admin)
      operationId: updateTrack
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                curriculum:
                  $ref: '#/components/schemas/Curriculum'
                requirements:
                  type: array
                  items:
                    $ref: '#/components/schemas/Requirement'
                teachers:
                  type: array
                  items:
                    type: string
                difficulty:
                  type: integer
                  minimum: 1
                  maximum: 5
                type:
                  type: integer
                  description: "Тип трека для фронтенда"
                employment_prospects:
                  type: integer
                  minimum: 1
                  maximum: 10
                alumni_reviews:
                  type: integer
                  minimum: 1
                  maximum: 10
                web_link:
                  type: string
                has_certificates:
                  type: integer
                  enum: [0, 1]
                learning_style:
                  type: integer
                  enum: [1, 2, 3]
                desired_tech_skills:
                  type: integer
                  minimum: 1
                  maximum: 10
                desired_math_skills:
                  type: integer
                  minimum: 1
                  maximum: 10
                desired_soft_skills:
                  type: integer
                  minimum: 1
                  maximum: 10
                professional_goals:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Трек успешно обновлен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "track updated"
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ запрещен (требуется роль admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Трек не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /delete-track/{id}:
    delete:
      tags:
        - Tracks
      summary: Удалить трек (только admin)
      operationId: deleteTrack
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Трек успешно удален
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "track deleted"
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Доступ запрещен (требуется роль admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Трек не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== RECOMMENDATIONS ====================
  /student/recommendations:
    get:
      tags:
        - Recommendations
      summary: Получить рекомендации треков
      description: |
        Возвращает список треков, отсортированных по степени соответствия предпочтениям студента (метод PROMETHEE).
        
        **Требования для получения рекомендаций:**
        - Профессиональные цели (не пустой массив)
        - Все академические оценки (от 2 до 5)
        - Хотя бы один навык > 0
        - Стиль обучения (1, 2 или 3)
      operationId: getRecommendations
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationsResponse'
        '400':
          description: Профиль не полностью заполнен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error:
                  code: "PROFILE_NOT_COMPLETE"
                  message: "Profile is not complete enough for recommendations"
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==================== TRACK SELECTION ====================
  /student/select-track:
    post:
      tags:
        - Selection
      summary: Выбрать трек
      description: Студент выбирает трек для изучения
      operationId: selectTrack
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - track_id
              properties:
                track_id:
                  type: string
                  format: uuid
                  description: ID выбранного трека
      responses:
        '200':
          description: Трек успешно выбран
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "track selected"
        '400':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Студент или трек не найдены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /student/selected-tracks:
    get:
      tags:
        - Selection
      summary: Получить выбранные треки
      description: Возвращает список треков, выбранных студентом
      operationId: getSelectedTracks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  tracks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Track'
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /student/unselect-track/{id}:
    delete:
      tags:
        - Selection
      summary: Отменить выбор трека
      description: Удаляет выбранный трек из списка студента
      operationId: unselectTrack
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID трека для отмены выбора
      responses:
        '200':
          description: Выбор успешно отменен
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "track unselected"
        '401':
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Выбор не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    Grades:
      type: object
      properties:
        informatics:
          type: integer
          minimum: 2
          maximum: 5
        programming:
          type: integer
          minimum: 2
          maximum: 5
        foreign_language:
          type: integer
          minimum: 2
          maximum: 5
        physics:
          type: integer
          minimum: 2
          maximum: 5
        aig:
          type: integer
          minimum: 2
          maximum: 5
        math_analysis:
          type: integer
          minimum: 2
          maximum: 5
        algorithms_data_structures:
          type: integer
          minimum: 2
          maximum: 5
        databases:
          type: integer
          minimum: 2
          maximum: 5
        discrete_math:
          type: integer
          minimum: 2
          maximum: 5

    Skills:
      type: object
      properties:
        databases:
          type: integer
          minimum: 0
          maximum: 10
        system_architecture:
          type: integer
          minimum: 0
          maximum: 10
        algorithmic_programming:
          type: integer
          minimum: 0
          maximum: 10
        public_speaking:
          type: integer
          minimum: 0
          maximum: 10
        testing:
          type: integer
          minimum: 0
          maximum: 10
        analytics:
          type: integer
          minimum: 0
          maximum: 10
        machine_learning:
          type: integer
          minimum: 0
          maximum: 10
        os_knowledge:
          type: integer
          minimum: 0
          maximum: 10
        research_projects:
          type: integer
          minimum: 0
          maximum: 10

    Preferences:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        professional_goals:
          type: array
          items:
            type: integer
        grades:
          $ref: '#/components/schemas/Grades'
        skills:
          $ref: '#/components/schemas/Skills'
        learning_style:
          type: integer
          enum: [1, 2, 3]
        certificates:
          type: integer
          enum: [0, 1]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ==================== TRACK SCHEMAS ====================
    Course:
      type: object
      description: Информация о курсе в семестре
      properties:
        name:
          type: string
          description: Название курса
          example: "Введение в программирование"
        description:
          type: string
          description: Описание курса
          example: "Основы Go, синтаксис, переменные, функции"
        is_elective:
          type: boolean
          description: "false - обязательный курс, true - курс по выбору"
          example: false
        options:
          type: array
          description: "Варианты выбора (если is_elective = true)"
          items:
            type: string
          example: ["A2", "B1", "B2"]

    Semester:
      type: object
      description: Семестр с курсами
      properties:
        number:
          type: integer
          description: Номер семестра
          example: 1
        courses:
          type: array
          description: Список курсов в семестре
          items:
            $ref: '#/components/schemas/Course'

    YearTrack:
      type: object
      description: Трек на один год (для типа single)
      properties:
        name:
          type: string
          description: Название трека на год
        description:
          type: string
          description: Описание
        semesters:
          type: array
          description: Семестры в этом году
          items:
            $ref: '#/components/schemas/Semester'

    YearBranch:
      type: object
      description: Ветка выбора (для типа branching)
      properties:
        name:
          type: string
          description: Название подтрека
        description:
          type: string
          description: Описание
        semesters:
          type: array
          description: Семестры в этом подтреке
          items:
            $ref: '#/components/schemas/Semester'

    YearPlan:
      type: object
      description: План на один учебный год
      properties:
        year:
          type: integer
          description: Номер года обучения (3,4,5,6,7,8 семестр)
          example: 3
        type:
          type: string
          enum: [single, branching]
          description: "single - один трек, branching - выбор подтрека"
        track:
          $ref: '#/components/schemas/YearTrack'
        branches:
          type: array
          description: Список подтреков для выбора (при type=branching)
          items:
            $ref: '#/components/schemas/YearBranch'

    Curriculum:
      type: object
      description: Учебный план, разбитый по годам с возможностью выбора подтреков
      properties:
        years:
          type: array
          description: Массив учебных лет
          items:
            $ref: '#/components/schemas/YearPlan'

    Requirement:
      type: object
      properties:
        subject:
          type: string
          description: Название предмета
          example: "programming"
        min_grade:
          type: integer
          minimum: 2
          maximum: 5
          description: Минимальная оценка для поступления
          example: 4

    Track:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        curriculum:
          $ref: '#/components/schemas/Curriculum'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/Requirement'
        teachers:
          type: array
          items:
            type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          description: "Сложность трека (1 - легкий, 5 - очень сложный)"
          example: 3
        type:
          type: integer
          description: "Тип трека для фронтенда (1 - технический, 2 - аналитический и т.д.)"
          example: 1
        employment_prospects:
          type: integer
          minimum: 1
          maximum: 10
        alumni_reviews:
          type: integer
          minimum: 1
          maximum: 10
        web_link:
          type: string
        has_certificates:
          type: integer
          enum: [0, 1]
        learning_style:
          type: integer
          enum: [1, 2, 3]
        desired_tech_skills:
          type: integer
          minimum: 1
          maximum: 10
        desired_math_skills:
          type: integer
          minimum: 1
          maximum: 10
        desired_soft_skills:
          type: integer
          minimum: 1
          maximum: 10
        professional_goals:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTrackInput:
      type: object
      required:
        - name
        - description
        - curriculum
        - requirements
        - teachers
        - difficulty
        - type
        - employment_prospects
        - alumni_reviews
        - learning_style
        - desired_tech_skills
        - desired_math_skills
        - desired_soft_skills
      properties:
        name:
          type: string
        description:
          type: string
        curriculum:
          $ref: '#/components/schemas/Curriculum'
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/Requirement'
        teachers:
          type: array
          items:
            type: string
        difficulty:
          type: integer
          minimum: 1
          maximum: 5
          description: "Сложность трека (1 - легкий, 5 - очень сложный)"
          example: 3
        type:
          type: integer
          description: "Тип трека для фронтенда"
          example: 1
        employment_prospects:
          type: integer
          minimum: 1
          maximum: 10
        alumni_reviews:
