services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${STANDART_PG_USER}
      POSTGRES_PASSWORD: ${STANDART_PG_PASSWORD}
      POSTGRES_DB: ${STANDART_PG_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile.golang
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
    - "${APP_PORT}:${APP_PORT}"
    networks:
      - internal
      - public

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - internal  
      - public
    environment:
    - APP_PORT=${APP_PORT} 
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  internal:
    internal: true
  public:

volumes:
  postgres_data: